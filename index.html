<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RuiBellaGPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #ffffff10;
      --accent: #c8f542;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #c8f54215 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Avatar */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
      animation: fadeDown 0.6s ease both;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8f542, #42f5c8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #0a0a0f;
      box-shadow: 0 0 40px #c8f54240;
      flex-shrink: 0;
    }

    /* Name & bio */
    .profile {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .profile h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .profile h1 span {
      color: var(--accent);
    }

    .profile p {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }

    .link-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px #c8f54220;
    }

    .link-btn:hover::after { opacity: 0.05; }

    .link-btn:hover .arrow { transform: translateX(3px); color: var(--accent); }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .link-btn .label { flex: 1; }

    .arrow {
      font-size: 1rem;
      color: var(--muted);
      transition: all 0.2s;
    }

    /* Icon colors */
    .ig .icon   { background: #e1306c20; color: #e1306c; }
    .wa .icon   { background: #25d36620; color: #25d366; }
    .ki .icon   { background: #ff6b3520; color: #ff6b35; }
    .tt .icon   { background: #ffffff15; color: #fff; }
    .kw .icon   { background: #f5c84220; color: #f5c842; }

    /* Animation delays */
    .link-btn:nth-child(1) { animation-delay: 0.2s; }
    .link-btn:nth-child(2) { animation-delay: 0.3s; }
    .link-btn:nth-child(3) { animation-delay: 0.4s; }
    .link-btn:nth-child(4) { animation-delay: 0.5s; }
    .link-btn:nth-child(5) { animation-delay: 0.6s; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 2.5rem;
      color: #444;
      font-size: 0.75rem;
      animation: fadeUp 0.5s 0.7s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
